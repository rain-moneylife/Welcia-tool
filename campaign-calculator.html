<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キャンペーンポイント計算ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root {
  --bg: #f5f3ef;
  --surface: #ffffff;
  --surface2: #faf9f7;
  --border: #e8e4dc;
  --border2: #d4cfc4;
  --text: #1a1814;
  --text-muted: #8a8278;
  --text-hint: #b8b2a8;
  --accent: #d4541a;
  --accent-light: #fff0e8;
  --accent-border: #f0b898;
  --green: #1a7a4a;
  --green-light: #e8f5ee;
  --green-border: #a8d8be;
  --blue: #1a4a8a;
  --blue-light: #e8f0fa;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
}

body {
  background: var(--bg);
  min-height: 100vh;
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--text);
  padding: 2rem 1rem 4rem;
}

.container {
  max-width: 760px;
  margin: 0 auto;
}

header {
  margin-bottom: 2rem;
  animation: fadeUp 0.4s ease both;
}

header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--text);
}

header p {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* 合計金額 */
.total-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.25rem 1.5rem;
  margin-bottom: 1.5rem;
  box-shadow: var(--shadow);
  animation: fadeUp 0.4s ease 0.05s both;
}

.field-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  font-family: 'DM Mono', monospace;
  flex-shrink: 0;
}

.badge.green { background: var(--green); }
.badge.blue  { background: var(--blue); }
.badge.gray  { background: var(--text-muted); }

input[type="number"] {
  width: 100%;
  height: 48px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0 1rem;
  font-size: 18px;
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  -moz-appearance: textfield;
}
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type="number"]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(212,84,26,0.1);
}

/* キャンペーンリスト */
.campaigns-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  animation: fadeUp 0.4s ease 0.1s both;
}

.campaigns-header span {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
}

.btn-add {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  transition: background 0.1s, transform 0.08s;
}
.btn-add:hover { background: #bf4a15; }
.btn-add:active { transform: scale(0.97); }

.campaign-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.campaign-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.25rem 1.5rem;
  box-shadow: var(--shadow);
  animation: fadeUp 0.3s ease both;
  position: relative;
}

.campaign-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}

.campaign-name-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}

.campaign-num {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  font-family: 'DM Mono', monospace;
  background: var(--accent-light);
  border: 1px solid var(--accent-border);
  border-radius: 6px;
  padding: 2px 8px;
}

.campaign-name-input {
  height: 32px;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  border-radius: 0;
  padding: 0 4px;
  font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 500;
  color: var(--text);
  width: 180px;
  box-shadow: none;
}
.campaign-name-input:focus {
  border-bottom-color: var(--accent);
  box-shadow: none;
}

.btn-remove {
  width: 28px;
  height: 28px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: transparent;
  color: var(--text-hint);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
  line-height: 1;
}
.btn-remove:hover { background: #fee; border-color: #f9b8b8; color: #c0392b; }

.campaign-fields {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}

@media (max-width: 540px) {
  .campaign-fields { grid-template-columns: 1fr 1fr; }
  .campaign-name-input { width: 120px; }
}

.field-group label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.field-group input {
  height: 42px;
  font-size: 16px;
}

.field-result {
  background: var(--green-light);
  border: 1px solid var(--green-border);
  border-radius: 10px;
  padding: 8px 12px;
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  font-weight: 500;
  color: var(--green);
  display: flex;
  align-items: center;
  min-height: 42px;
}

/* 合計結果 */
.result-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  margin-top: 1.5rem;
  box-shadow: var(--shadow-lg);
  animation: fadeUp 0.4s ease 0.15s both;
}

.result-section h2 {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--border);
}

.result-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

@media (max-width: 480px) { .result-grid { grid-template-columns: 1fr; } }

.result-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem 1.25rem;
}

.result-item.highlight {
  background: var(--accent-light);
  border-color: var(--accent-border);
}

.result-item.highlight2 {
  background: var(--green-light);
  border-color: var(--green-border);
}

.result-item-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.result-item.highlight .result-item-label { color: #a03010; }
.result-item.highlight2 .result-item-label { color: var(--green); }

.result-item-value {
  font-family: 'DM Mono', monospace;
  font-size: 26px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.2;
}

.result-item.highlight .result-item-value { color: var(--accent); }
.result-item.highlight2 .result-item-value { color: var(--green); }

.result-item-unit {
  font-size: 13px;
  color: var(--text-muted);
  margin-left: 4px;
}

.hint {
  font-size: 11px;
  color: var(--text-hint);
  margin-top: 3px;
  font-family: 'DM Mono', monospace;
}

/* reset */
.btn-reset {
  display: block;
  width: 100%;
  margin-top: 1rem;
  padding: 10px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 8px;
  font-size: 13px;
  color: var(--text-muted);
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  transition: all 0.1s;
}
.btn-reset:hover { background: var(--surface2); color: var(--text); }

@keyframes fadeUp {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🎯 キャンペーンポイント計算ツール</h1>
    <p>各キャンペーンのポイント還元を入力すると、合計結果を自動計算します</p>
  </header>

  <!-- ① 合計金額 -->
  <div class="total-section">
    <div class="field-label">
      <span class="badge">①</span>
      購入合計金額（全商品）
    </div>
    <input type="number" id="totalAmount" placeholder="例: 50000" min="0" oninput="calculate()">
  </div>

  <!-- キャンペーン -->
  <div class="campaigns-header">
    <span id="campaignCount">キャンペーン 0 件</span>
    <button class="btn-add" onclick="addCampaign()">＋ キャンペーンを追加</button>
  </div>

  <div class="campaign-list" id="campaignList"></div>

  <!-- 結果 -->
  <div class="result-section">
    <h2>📊 計算結果（全キャンペーン合算）</h2>
    <div class="result-grid">
      <div class="result-item highlight">
        <div class="result-item-label"><span class="badge" style="width:16px;height:16px;font-size:10px;background:var(--accent)">③</span>合計還元ポイント</div>
        <div class="result-item-value" id="r3">—<span class="result-item-unit">pt</span></div>
        <div class="hint">全キャンペーン ③ の合計</div>
      </div>
      <div class="result-item">
        <div class="result-item-label"><span class="badge gray" style="width:16px;height:16px;font-size:10px;">④</span>③ ÷ 0.665</div>
        <div class="result-item-value" id="r4">—</div>
        <div class="hint">合計③ ÷ 0.665</div>
      </div>
      <div class="result-item">
        <div class="result-item-label"><span class="badge gray" style="width:16px;height:16px;font-size:10px;">⑤</span>① − ④</div>
        <div class="result-item-value" id="r5">—</div>
        <div class="hint">合計金額 − ④</div>
      </div>
      <div class="result-item highlight2">
        <div class="result-item-label"><span class="badge green" style="width:16px;height:16px;font-size:10px;">⑥</span>⑤ ÷ 1.5</div>
        <div class="result-item-value" id="r6">—</div>
        <div class="hint">⑤ ÷ 1.5</div>
      </div>
    </div>
    <button class="btn-reset" onclick="resetAll()">🔄 すべてリセット</button>
  </div>
</div>

<script>
let campaigns = [];
let idCounter = 0;

function addCampaign() {
  idCounter++;
  campaigns.push({ id: idCounter, name: 'キャンペーン' + idCounter, rate: '', limit: '', amount: '' });
  renderCampaigns();
  calculate();
}

function removeCampaign(id) {
  campaigns = campaigns.filter(c => c.id !== id);
  renderCampaigns();
  calculate();
}

function updateCampaign(id, field, value) {
  const c = campaigns.find(c => c.id === id);
  if (c) { c[field] = value; calculate(); }
}

function renderCampaigns() {
  const list = document.getElementById('campaignList');
  document.getElementById('campaignCount').textContent = 'キャンペーン ' + campaigns.length + ' 件';

  list.innerHTML = campaigns.map((c, i) => {
    const pts = calcCampaignPoints(c);
    const ptsStr = pts !== null ? Math.floor(pts).toLocaleString() + ' pt' : '—';
    return `
    <div class="campaign-card" id="card-${c.id}">
      <div class="campaign-card-header">
        <div class="campaign-name-wrap">
          <span class="campaign-num">No.${i+1}</span>
          <input class="campaign-name-input" type="text" value="${c.name}"
            oninput="updateName(${c.id}, this.value)" placeholder="キャンペーン名">
        </div>
        <button class="btn-remove" onclick="removeCampaign(${c.id})" title="削除">×</button>
      </div>
      <div class="campaign-fields">
        <div class="field-group">
          <label><span class="badge" style="width:16px;height:16px;font-size:9px;">②</span>対象商品の購入金額</label>
          <input type="number" value="${c.amount}" placeholder="例: 20000" min="0"
            oninput="updateCampaign(${c.id},'amount',this.value)">
        </div>
        <div class="field-group">
          <label>還元率 (%)</label>
          <input type="number" value="${c.rate}" placeholder="例: 10" min="0" max="100" step="0.1"
            oninput="updateCampaign(${c.id},'rate',this.value)">
        </div>
        <div class="field-group">
          <label>付与上限 (pt)</label>
          <input type="number" value="${c.limit}" placeholder="例: 10000" min="0"
            oninput="updateCampaign(${c.id},'limit',this.value)">
        </div>
      </div>
      <div style="margin-top:10px;">
        <div class="field-label" style="margin-bottom:6px;">
          <span class="badge green" style="width:16px;height:16px;font-size:9px;">③</span>
          このキャンペーンの還元ポイント
        </div>
        <div class="field-result" id="pts-${c.id}">${ptsStr}</div>
      </div>
    </div>`;
  }).join('');
}

function updateName(id, value) {
  const c = campaigns.find(c => c.id === id);
  if (c) c.name = value;
}

function calcCampaignPoints(c) {
  const amount = parseFloat(c.amount);
  const rate   = parseFloat(c.rate);
  const limit  = parseFloat(c.limit);
  if (isNaN(amount) || isNaN(rate)) return null;
  const pts = amount * (rate / 100);
  return isNaN(limit) ? pts : Math.min(pts, limit);
}

function fmt(n) {
  if (n === null || isNaN(n)) return '—';
  return Math.round(n).toLocaleString();
}

function calculate() {
  // 各キャンペーンの③を更新
  campaigns.forEach(c => {
    const el = document.getElementById('pts-' + c.id);
    if (!el) return;
    const pts = calcCampaignPoints(c);
    el.textContent = pts !== null ? Math.floor(pts).toLocaleString() + ' pt' : '—';
  });

  const total1 = parseFloat(document.getElementById('totalAmount').value);
  const validPts = campaigns.map(c => calcCampaignPoints(c)).filter(v => v !== null);
  const sum3 = validPts.length > 0 ? validPts.reduce((a, b) => a + b, 0) : null;

  const r3 = sum3;
  const r4 = r3 !== null ? r3 / 0.665 : null;
  const r5 = (!isNaN(total1) && r4 !== null) ? total1 - r4 : null;
  const r6 = r5 !== null ? r5 / 1.5 : null;

  document.getElementById('r3').innerHTML = r3 !== null ? Math.round(r3).toLocaleString() + '<span class="result-item-unit">pt</span>' : '—';
  document.getElementById('r4').innerHTML = r4 !== null ? Math.round(r4).toLocaleString() : '—';
  document.getElementById('r5').innerHTML = r5 !== null ? Math.round(r5).toLocaleString() : '—';
  document.getElementById('r6').innerHTML = r6 !== null ? Math.round(r6).toLocaleString() : '—';
}

function resetAll() {
  if (!confirm('すべての入力をリセットしますか？')) return;
  campaigns = [];
  idCounter = 0;
  document.getElementById('totalAmount').value = '';
  renderCampaigns();
  calculate();
}

// 初期キャンペーンを1件追加
addCampaign();
</script>
</body>
</html>
