<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ウエル活ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#cadbe5;
  --surface:#eef4f8;
  --surface2:#dde9f0;
  --border:#b0c8d8;
  --border2:#8ab0c4;
  --text:#0f2a3a;
  --text-muted:#4a7089;
  --text-hint:#7aaabb;
  --accent:#1a6a9a;
  --accent-light:#ddeef8;
  --accent-border:#90c0dc;
  --green:#0f6a4a;
  --green-light:#d8f0e8;
  --green-border:#80c8aa;
  --blue:#0f3a6a;
  --blue-light:#d0e4f4;
  --red:#a02020;
  --red-light:#fde8e8;
  --shadow:0 2px 12px rgba(15,42,58,0.1);
  --shadow-lg:0 8px 32px rgba(15,42,58,0.15);
  --r:14px;
}
body{background:var(--bg);min-height:100vh;font-family:'Noto Sans JP',sans-serif;color:var(--text);padding-bottom:20px;}

/* ヘッダー */
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px 0;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.app-title{font-size:16px;font-weight:900;color:var(--text);margin-bottom:8px;letter-spacing:-0.01em;}
.app-title span{color:var(--accent);}

/* タブ */
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.tab-btn{padding:6px 4px;font-size:10px;font-weight:700;font-family:'Noto Sans JP',sans-serif;border:none;background:transparent;color:var(--text-muted);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.15s;text-align:center;line-height:1.4;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-btn .tab-icon{display:block;font-size:18px;margin-bottom:2px;}

/* コンテンツ */
.tab-content{display:none;padding:16px;}
.tab-content.active{display:block;}

/* ===== 電卓 ===== */
.calc-screen{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;box-shadow:var(--shadow);}
.calc-expr-display{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);min-height:16px;text-align:right;margin-bottom:1px;cursor:pointer;border-radius:6px;padding:2px 4px;transition:background 0.1s;}
.calc-expr-display:hover{background:var(--surface2);}
.calc-expr-display.editing{display:none;}
.calc-expr-editor{display:none;width:100%;background:var(--surface2);border:1.5px solid var(--accent);border-radius:8px;padding:4px 8px;font-family:'DM Mono',monospace;font-size:13px;color:var(--text);outline:none;text-align:right;margin-bottom:2px;box-sizing:border-box;}
.calc-expr-editor.editing{display:block;}
.calc-expr-hint{font-size:10px;color:var(--text-hint);text-align:right;margin-bottom:1px;display:none;}
.calc-expr-hint.editing{display:block;}
.calc-expr-formula{font-family:'DM Mono',monospace;font-size:13px;color:var(--text-muted);text-align:right;min-height:18px;margin-bottom:1px;word-break:break-all;}
.calc-main-display{font-family:'DM Mono',monospace;font-size:36px;font-weight:500;color:var(--text);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.calc-main-display.small{font-size:24px;}
.calc-main-display.tiny{font-size:18px;}
.calc-special{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:6px;}
.sp-btn{height:40px;border:2px solid var(--accent);border-radius:8px;background:var(--accent-light);color:var(--accent);font-size:11px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all 0.1s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
.sp-btn .sp-sub{font-size:9px;font-weight:400;opacity:0.7;}
.sp-btn:active{background:var(--accent);color:#fff;transform:scale(0.96);}
.sp-btn.green-btn{border-color:var(--green);background:var(--green-light);color:var(--green);}
.sp-btn.green-btn:active{background:var(--green);}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.c-btn{height:52px;border:none;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:18px;font-weight:700;cursor:pointer;transition:all 0.08s;display:flex;align-items:center;justify-content:center;}
.c-btn:active{transform:scale(0.94);}
.c-btn.num{background:var(--surface);color:var(--text);border:1px solid var(--border);}
.c-btn.num:active{background:var(--surface2);}
.c-btn.op{background:var(--surface2);color:var(--accent);border:1px solid var(--accent-border);font-size:20px;}
.c-btn.op:active{background:var(--accent-light);}
.c-btn.fn{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);font-size:13px;}
.c-btn.fn:active{background:var(--border);}
.c-btn.eq{background:var(--accent);color:#fff;border:none;box-shadow:0 4px 12px rgba(26,106,154,0.3);}
.c-btn.eq:active{background:#155a84;}
.c-btn.zero{grid-column:span 2;}

/* ===== 買い物メモ ===== */
.memo-toolbar{display:flex;gap:6px;margin-bottom:8px;}
.memo-input-wrap{flex:1;display:flex;gap:6px;}
.memo-input{flex:1;height:38px;background:var(--surface);border:2px solid var(--text);border-radius:8px;padding:0 10px;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--text);outline:none;}
.memo-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,106,154,0.1);}
.memo-add-btn{height:38px;padding:0 12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;white-space:nowrap;}
.memo-add-btn:active{background:#155a84;}
.memo-actions{display:flex;gap:4px;margin-bottom:8px;}
.memo-action-btn{flex:1;height:30px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text-muted);font-size:10px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
.memo-action-btn:hover{background:var(--surface2);}
.memo-action-btn.danger{border-color:#e8a0a0;color:var(--red);}
.memo-list{display:flex;flex-direction:column;gap:6px;}
.memo-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 10px;display:flex;align-items:center;gap:8px;transition:all 0.15s;box-shadow:var(--shadow);}
.memo-item.checked{background:var(--surface2);opacity:0.6;}
.memo-check{width:24px;height:24px;border:2px solid var(--border2);border-radius:50%;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;background:#fff;}
.memo-item.checked .memo-check{background:var(--green);border-color:var(--green);}
.memo-check-icon{width:10px;height:10px;display:none;}
.memo-item.checked .memo-check-icon{display:block;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.memo-text{flex:1;font-size:14px;font-weight:500;color:var(--text);}
.memo-item.checked .memo-text{text-decoration:line-through;color:var(--text-muted);}
.memo-del{width:24px;height:24px;border:none;background:transparent;color:var(--text-hint);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px;}
.memo-del:hover{background:var(--red-light);color:var(--red);}
.memo-empty{text-align:center;padding:24px 20px;color:var(--text-muted);font-size:13px;}
.memo-progress{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 10px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.memo-progress-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.memo-progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width 0.3s;}
.memo-progress-text{font-size:11px;font-weight:700;color:var(--green);white-space:nowrap;}

/* 買い物メモ内電卓 */
.memo-calc-toggle{display:flex;justify-content:flex-end;margin-bottom:8px;}
.memo-calc-open-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--surface);border:1.5px solid var(--accent-border);border-radius:8px;font-size:13px;font-weight:700;font-family:'Noto Sans JP',sans-serif;color:var(--accent);cursor:pointer;transition:all 0.1s;}
.memo-calc-open-btn:active{background:var(--accent-light);}
.memo-inline-calc{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:2px solid var(--accent-border);box-shadow:0 -8px 24px rgba(15,42,58,0.15);z-index:200;padding:6px 10px 12px;}
.memo-inline-calc.open{display:block;}
.memo-calc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.memo-calc-title{font-size:12px;font-weight:700;color:var(--text-muted);}
.memo-calc-close{width:24px;height:24px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text-muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.memo-calc-close:hover{background:var(--red-light);color:var(--red);}
.memo-calc-screen{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px 10px;margin-bottom:6px;}
.memo-calc-formula{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);text-align:right;min-height:13px;}
.memo-calc-expr{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);text-align:right;cursor:pointer;border-radius:4px;padding:1px 4px;}
.memo-calc-expr:hover{background:var(--border);}
.memo-calc-expr.editing{display:none;}
.memo-calc-expr-editor{display:none;width:100%;background:var(--surface);border:1.5px solid var(--accent);border-radius:6px;padding:3px 6px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);outline:none;text-align:right;box-sizing:border-box;}
.memo-calc-expr-editor.editing{display:block;}
.memo-calc-display{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--text);text-align:right;}
.memo-calc-special{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:4px;}
.memo-sp-btn{height:28px;border:1.5px solid var(--accent);border-radius:6px;background:var(--accent-light);color:var(--accent);font-size:10px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
.memo-sp-btn.green-btn{border-color:var(--green);background:var(--green-light);color:var(--green);}
.memo-sp-btn:active{opacity:0.7;}
.memo-calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.mc2-btn{height:40px;border:none;border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.08s;display:flex;align-items:center;justify-content:center;}
.mc2-btn:active{opacity:0.7;}
.mc2-btn.num{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.mc2-btn.op{background:var(--surface2);color:var(--accent);border:1px solid var(--accent-border);}
.mc2-btn.fn{background:var(--surface);color:var(--text-muted);border:1px solid var(--border);font-size:11px;}
.mc2-btn.eq{background:var(--accent);color:#fff;}
.mc2-btn.zero{grid-column:span 2;}
/* メモ+電卓 分割レイアウト */
.memo-split-wrap{display:flex;flex-direction:column;height:calc(100vh - 80px);}
.memo-top-area{flex:1;overflow-y:auto;padding:6px 12px 0;}
.memo-bottom-calc{flex-shrink:0;background:var(--surface);border-top:2px solid var(--accent-border);box-shadow:0 -4px 16px rgba(15,42,58,0.12);padding:6px 10px 10px;}
.memo-normal-wrap{padding:6px 12px 0;}


.io-wrap{display:flex;gap:6px;margin-bottom:8px;}
.io-btn{flex:1;height:30px;border:1px solid var(--accent-border);border-radius:6px;background:var(--accent-light);color:var(--accent);font-size:11px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
.io-btn:hover{background:var(--accent);color:#fff;}

/* ===== 共通カード ===== */
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:12px;box-shadow:var(--shadow);}
.field-label{font-size:12px;font-weight:700;color:var(--text-muted);letter-spacing:0.04em;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0;}
.badge.green{background:var(--green);}
.badge.blue{background:var(--blue);}
.badge.gray{background:var(--text-muted);}

/* トリガーボタン */
.trigger-btn{width:100%;height:52px;background:#eef4f8;border:2.5px solid var(--text);border-radius:10px;padding:0 14px;font-size:15px;font-family:'Noto Sans JP',sans-serif;font-weight:600;color:var(--text-muted);text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:border-color 0.15s;}
.trigger-btn.active,.trigger-btn:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,106,154,0.1);}
.trigger-btn.has-value{color:var(--text);font-weight:700;}

/* 数値入力 */
input[type="number"].field-input{width:100%;height:52px;background:#eef4f8;border:2.5px solid var(--text);border-radius:10px;padding:0 14px;font-size:16px;font-family:'Noto Sans JP',sans-serif;font-weight:600;color:var(--text);outline:none;-moz-appearance:textfield;transition:border-color 0.15s;}
input[type="number"].field-input::-webkit-inner-spin-button,
input[type="number"].field-input::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type="number"].field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,106,154,0.1);}
input[type="number"].field-input::placeholder{color:var(--text-muted);font-size:13px;font-weight:500;}
.product-row input[type="number"]{height:36px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:400;background:var(--surface2);width:100%;outline:none;padding:0 6px;-moz-appearance:textfield;}
.product-row input[type="number"]::-webkit-inner-spin-button,
.product-row input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;}

/* インライン電卓パネル */
.inline-calc{display:none;margin-top:8px;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.inline-calc.open{display:block;}
.calc-display-mini{background:var(--surface2);border-bottom:1px solid var(--border);padding:10px 14px;min-height:68px;display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-end;gap:2px;}
.calc-expr-mini{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);min-height:16px;text-align:right;}
.calc-cur-mini{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;color:var(--text);text-align:right;}
.calc-grid-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);}
.mc-btn{height:52px;border:none;background:var(--surface2);font-family:'Noto Sans JP',sans-serif;font-size:16px;font-weight:700;color:var(--text);cursor:pointer;transition:background 0.08s;}
.mc-btn:active{background:var(--border);}
.mc-btn.fn{color:var(--text-muted);font-size:13px;background:var(--surface);}
.mc-btn.op{color:var(--accent);background:var(--surface);}
.mc-btn.op:active{background:var(--accent-light);}
.mc-btn.eq{background:var(--accent);color:#fff;}
.mc-btn.zero{grid-column:span 2;}
.calc-set-btn{width:100%;padding:10px;background:var(--green-light);border:none;border-top:1px solid var(--green-border);color:var(--green);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.calc-set-btn:hover{background:#c0e8d0;}

/* 商品リスト */
.product-panel{display:none;margin-top:8px;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.product-panel.open{display:block;}
.product-list-inner{padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
.product-header-row{display:grid;grid-template-columns:1fr 90px 56px 28px;gap:6px;padding:0 0 6px;border-bottom:1px solid var(--border);}
.product-row{display:grid;grid-template-columns:1fr 90px 56px 28px;gap:6px;align-items:center;}
.product-row-combined{display:grid;grid-template-columns:1fr 90px 56px 28px;gap:6px;align-items:center;margin-top:4px;}
.fixed-pt-row{display:grid;grid-template-columns:1fr 90px 56px 28px;gap:6px;align-items:center;background:var(--green-light);border-radius:8px;padding:4px 6px;margin-top:4px;margin-bottom:4px;}
.fixed-pt-row input[type="number"]{background:#fff;}
.fixed-pt-row-label{font-size:10px;color:var(--green);font-weight:700;}
.product-row input[type="text"]{height:36px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0 8px;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--text);outline:none;width:100%;}
.product-row input[type="text"]:focus{border-color:var(--accent);}
.product-row-label{font-size:10px;color:var(--text-hint);text-align:center;}
.product-footer{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-top:1px solid var(--border);background:var(--surface2);}
.btn-add-product{display:flex;align-items:center;gap:4px;padding:6px 12px;background:transparent;border:1px solid var(--border2);border-radius:6px;font-size:12px;font-family:'Noto Sans JP',sans-serif;color:var(--text-muted);cursor:pointer;}
.btn-add-product:hover{background:var(--surface);color:var(--text);}
.product-total-label{font-size:11px;color:var(--text-muted);margin-right:6px;}
.product-total{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--green);}
.btn-remove-product{width:28px;height:28px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text-hint);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-remove-product:hover{background:var(--red-light);color:var(--red);}

/* キャンペーンカード */
.campaigns-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.campaigns-header span{font-size:13px;font-weight:500;color:var(--text-muted);}
.btn-add-campaign{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
.btn-add-campaign:active{background:#155a84;}
.campaign-list{display:flex;flex-direction:column;gap:10px;}
.campaign-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow);}
.campaign-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.campaign-name-wrap{display:flex;align-items:center;gap:8px;flex:1;}
.campaign-num{font-size:12px;font-weight:700;color:var(--accent);background:var(--accent-light);border:1px solid var(--accent-border);border-radius:6px;padding:2px 8px;font-family:'DM Mono',monospace;}
.campaign-name-input{height:32px;background:transparent;border:none;border-bottom:1px solid var(--border);border-radius:0;padding:0 4px;font-size:14px;font-family:'Noto Sans JP',sans-serif;font-weight:500;color:var(--text);width:140px;outline:none;}
.campaign-name-input:focus{border-bottom-color:var(--accent);}
.btn-remove-campaign{width:28px;height:28px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text-hint);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-remove-campaign:hover{background:var(--red-light);color:var(--red);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.field-group label{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:0.04em;margin-bottom:5px;display:block;}
.field-result{background:var(--green-light);border:1px solid var(--green-border);border-radius:10px;padding:8px 12px;font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--green);display:flex;flex-direction:column;gap:3px;min-height:42px;}
.field-result.capped{background:var(--red-light);border-color:#e8a0a0;}
.cap-warning{font-size:11px;font-weight:500;color:var(--red);font-family:'Noto Sans JP',sans-serif;}

/* 結果セクション */
.result-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-top:12px;box-shadow:var(--shadow-lg);}
.result-section h2{font-size:13px;font-weight:700;color:var(--text-muted);letter-spacing:0.04em;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.result-item{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;}
.result-item.hi-orange{background:var(--accent-light);border-color:var(--accent-border);}

<script>
/* ===== タブ切替 ===== */
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['calc','memo','paypay','other'][i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

/* ===== 電卓エンジン（共通） ===== */
function createState() { return {cur:'0',prev:null,op:null,fresh:false,justCalc:false}; }
function fmtN(n) { const s=String(n); return s.length>10?parseFloat(n.toPrecision(8)).toString():s; }
function doCalc(a,b,op) {
  if(op==='+') return a+b;
  if(op==='−') return a-b;
  if(op==='×') return a*b;
  if(op==='÷') return b===0?null:a/b;
}
function stateNum(s,v) {
  if(s.justCalc){s.cur=v==='00'?'0':v;s.justCalc=false;s.fresh=false;}
  else if(s.fresh||s.cur==='0'){s.cur=v==='00'?'0':v;s.fresh=false;}
  else if(s.cur.replace('-','').replace('.','').length<11) s.cur+=v;
}
function stateDot(s) {
  if(s.justCalc){s.cur='0.';s.justCalc=false;s.fresh=false;}
  else if(!s.cur.includes('.')) s.cur+='.';
}
function stateOp(s,op) {
  const n=parseFloat(s.cur);
  if(s.prev!==null&&s.op&&!s.fresh&&!s.justCalc) {
    const r=doCalc(s.prev,n,s.op);
    if(r===null){s.cur='エラー';s.prev=null;s.op=null;return;}
    s.prev=parseFloat(fmtN(r)); s.cur=fmtN(s.prev);
  } else { s.prev=n; }
  s.op=op; s.fresh=true; s.justCalc=false;
}
function stateEq(s) {
  if(s.prev!==null&&s.op) {
    const n=parseFloat(s.cur);
    const r=doCalc(s.prev,n,s.op);
    if(r===null){s.cur='エラー';s.prev=null;s.op=null;return null;}
    const expr=fmtN(s.prev)+' '+s.op+' '+fmtN(n)+' =';
    s.cur=fmtN(parseFloat(r.toPrecision(10)));
    s.prev=null;s.op=null;s.justCalc=true;s.fresh=false;
    return expr;
  }
  return null;
}
function stateAC(s){s.cur='0';s.prev=null;s.op=null;s.fresh=false;s.justCalc=false;}
function stateDel(s){if(s.justCalc||s.cur==='エラー'){stateAC(s);return;}s.cur=s.cur.length>1?s.cur.slice(0,-1):'0';}
function statePercent(s){if(s.cur!=='エラー')s.cur=fmtN(parseFloat(s.cur)/100);}

/* ===== メイン電卓 ===== */
const MS = createState();
let mainExprStr = '';
let formulaParts = []; // 途中式を蓄積 例: ['1000', '+', '500', '×', '2']

function mainUpdate() {
  const d = document.getElementById('mainDisplay');
  const len = MS.cur.length;
  d.className = 'calc-main-display' + (len>9?' tiny':len>6?' small':'');
  d.textContent = MS.cur;
  // 途中式表示
  const exprEl = document.getElementById('mainExpr');
  const formulaEl = document.getElementById('mainFormula');
  if(mainExprStr) {
    if(exprEl) exprEl.textContent = mainExprStr;
    if(formulaEl) formulaEl.textContent = '';
  } else {
    const formula = formulaParts.join(' ');
    if(formulaEl) formulaEl.textContent = formula;
    if(exprEl) exprEl.textContent = formula ? MS.cur : '';
  }
}

function mainCalcNum(v) {
  if(MS.justCalc){ formulaParts=[]; mainExprStr=''; }
  stateNum(MS,v);
  // 最後の要素が数字なら更新、そうでなければ追加
  if(formulaParts.length>0 && !isOperator(formulaParts[formulaParts.length-1])) {
    formulaParts[formulaParts.length-1] = MS.cur;
  } else {
    formulaParts.push(MS.cur);
  }
  mainUpdate();
}
function mainCalcDot() {
  if(MS.justCalc){ formulaParts=[]; mainExprStr=''; }
  stateDot(MS);
  if(formulaParts.length>0 && !isOperator(formulaParts[formulaParts.length-1])) {
    formulaParts[formulaParts.length-1] = MS.cur;
  } else {
    formulaParts.push(MS.cur);
  }
  mainUpdate();
}
function mainCalcOp(op) {
  if(MS.justCalc){ formulaParts=[fmtN(parseFloat(MS.cur))]; mainExprStr=''; }
  // 連続演算子は置き換え
  if(formulaParts.length>0 && isOperator(formulaParts[formulaParts.length-1])) {
    formulaParts[formulaParts.length-1] = op;
  } else {
    formulaParts.push(op);
  }
  stateOp(MS,op);
  mainUpdate();
}
function mainCalcEq() {
  if(MS.prev!==null && MS.op) {
    const formula = formulaParts.join(' ') + ' =';
    const e = stateEq(MS);
    if(e) mainExprStr = formula;
    formulaParts = [MS.cur];
    mainUpdate();
  }
}
function mainCalcAC() { stateAC(MS); mainExprStr=''; formulaParts=[]; mainUpdate(); }
function mainCalcDel() {
  stateDel(MS);
  if(formulaParts.length>0 && !isOperator(formulaParts[formulaParts.length-1])) {
    if(MS.cur==='0') formulaParts.pop();
    else formulaParts[formulaParts.length-1] = MS.cur;
  }
  mainUpdate();
}
function mainCalcPercent() { statePercent(MS); if(formulaParts.length>0 && !isOperator(formulaParts[formulaParts.length-1])) formulaParts[formulaParts.length-1]=MS.cur; mainUpdate(); }
function isOperator(s) { return ['+','−','×','÷'].includes(s); }

function calcSpecial(type) {
  const val = parseFloat(MS.cur);
  if(isNaN(val)||MS.cur==='エラー') return;
  let result, label;
  if(type==='tax-in'){result=val*1.1;label='税込み';}
  else if(type==='tax-out'){result=val/1.1;label='税抜き';}
  else{result=val/1.5;label='ウエル活';}
  mainExprStr = fmtN(val)+' ['+label+'] =';
  MS.cur = fmtN(parseFloat(result.toPrecision(10)));
  MS.justCalc=true; MS.prev=null; MS.op=null;
  formulaParts=[MS.cur];
  mainUpdate();
}

/* ===== 途中式エディタ ===== */
function startExprEdit() {
  const exprEl = document.getElementById('mainExpr');
  const editor = document.getElementById('mainExprEditor');
  const hint = document.getElementById('mainExprHint');
  const formulaEl = document.getElementById('mainFormula');
  const currentExpr = formulaParts.join(' ') || mainExprStr.replace(' =','') || MS.cur;
  editor.value = currentExpr;
  exprEl.classList.add('editing');
  editor.classList.add('editing');
  hint.classList.add('editing');
  if(formulaEl) formulaEl.style.display='none';
  editor.focus();
  editor.select();
}

function commitExprEdit() {
  const exprEl = document.getElementById('mainExpr');
  const editor = document.getElementById('mainExprEditor');
  const hint = document.getElementById('mainExprHint');
  const formulaEl = document.getElementById('mainFormula');
  exprEl.classList.remove('editing');
  editor.classList.remove('editing');
  hint.classList.remove('editing');
  if(formulaEl) formulaEl.style.display='';
  const expr = editor.value.trim();
  if(!expr) return;
  evalExprStr(expr);
}

function exprEditorKey(e) {
  if(e.key==='Enter'){ e.preventDefault(); commitExprEdit(); }
  if(e.key==='Escape'){ 
    const exprEl=document.getElementById('mainExpr');
    const editor=document.getElementById('mainExprEditor');
    const hint=document.getElementById('mainExprHint');
    const formulaEl=document.getElementById('mainFormula');
    exprEl.classList.remove('editing');
    editor.classList.remove('editing');
    hint.classList.remove('editing');
    if(formulaEl) formulaEl.style.display='';
    editor.blur();
  }
}

function evalExprStr(expr) {
  // × → * , ÷ → / , − → - に変換して評価
  const normalized = expr
    .replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-')
    .replace(/[^0-9+\-*/.() ]/g,'');
  try {
    const result = Function('"use strict";return ('+normalized+')')();
    if(typeof result!=='number'||!isFinite(result)) throw new Error();
    const fmt = fmtN(parseFloat(result.toPrecision(10)));
    mainExprStr = expr + ' =';
    MS.cur = fmt; MS.prev=null; MS.op=null; MS.justCalc=true; MS.fresh=false;
    formulaParts = [fmt];
    mainUpdate();
  } catch(e) {
    document.getElementById('mainDisplay').textContent = 'エラー';
  }
}

/* ===== 買い物メモ ===== */
let memoItems = JSON.parse(localStorage.getItem('waon_memo')||'[]');

function saveMemo() { localStorage.setItem('waon_memo', JSON.stringify(memoItems)); }

function renderMemo() {
  const list = document.getElementById('memoList');
  const empty = document.getElementById('memoEmpty');
  const progress = document.getElementById('memoProgress');
  if(memoItems.length===0){list.innerHTML='';empty.style.display='block';progress.style.display='none';}
  else {
    empty.style.display='none';
    progress.style.display='flex';
    const checked = memoItems.filter(i=>i.checked).length;
    const pct = Math.round(checked/memoItems.length*100);
    document.getElementById('memoProgressFill').style.width=pct+'%';
    document.getElementById('memoProgressText').textContent=checked+'/'+memoItems.length;
    list.innerHTML = memoItems.map((item,idx)=>`
      <div class="memo-item${item.checked?' checked':''}" id="memo-${item.id}">
        <button class="memo-check" onclick="toggleMemo(${idx})">
          <svg class="memo-check-icon" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg>
        </button>
        <span class="memo-text">${escHtml(item.text)}</span>
        <button class="memo-del" onclick="deleteMemo(${idx})">×</button>
      </div>
    `).join('');
  }
  // splitビューも同期
  const split=document.getElementById('memoSplitWrap');
  if(split&&split.style.display!=='none') renderMemoSplit();
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

}

function memoCalcUpdate() {
  const d = document.getElementById('memoCalcDisplay');
  d.textContent = MemoMS.cur;
  const exprEl = document.getElementById('memoCalcExpr');
  const formulaEl = document.getElementById('memoCalcFormula');
  if(memoExprStr) {
    if(exprEl) exprEl.textContent = memoExprStr;
    if(formulaEl) formulaEl.textContent = '';
  } else {
    const formula = memoFormulaParts.join(' ');
    if(formulaEl) formulaEl.textContent = formula;
    if(exprEl) exprEl.textContent = formula ? MemoMS.cur : '';
  }
}
function memoCalcNum(v) {
  if(MemoMS.justCalc){ memoFormulaParts=[]; memoExprStr=''; }
  stateNum(MemoMS,v);
  if(memoFormulaParts.length>0 && !isOperator(memoFormulaParts[memoFormulaParts.length-1])) memoFormulaParts[memoFormulaParts.length-1]=MemoMS.cur;
  else memoFormulaParts.push(MemoMS.cur);
  memoCalcUpdate();
}
function memoCalcDot() {
  if(MemoMS.justCalc){ memoFormulaParts=[]; memoExprStr=''; }
  stateDot(MemoMS);
  if(memoFormulaParts.length>0 && !isOperator(memoFormulaParts[memoFormulaParts.length-1])) memoFormulaParts[memoFormulaParts.length-1]=MemoMS.cur;
  else memoFormulaParts.push(MemoMS.cur);
  memoCalcUpdate();
}
function memoCalcOp(op) {
  if(MemoMS.justCalc){ memoFormulaParts=[fmtN(parseFloat(MemoMS.cur))]; memoExprStr=''; }
  if(memoFormulaParts.length>0 && isOperator(memoFormulaParts[memoFormulaParts.length-1])) memoFormulaParts[memoFormulaParts.length-1]=op;
  else memoFormulaParts.push(op);
  stateOp(MemoMS,op);
  memoCalcUpdate();
}
function memoCalcEq() {
  if(MemoMS.prev!==null && MemoMS.op) {
    const formula = memoFormulaParts.join(' ') + ' =';
    stateEq(MemoMS);
    memoExprStr = formula;
    memoFormulaParts = [MemoMS.cur];
    memoCalcUpdate();
  }
}
function memoCalcAC() { stateAC(MemoMS); memoExprStr=''; memoFormulaParts=[]; memoCalcUpdate(); }
function memoCalcDel() {
  stateDel(MemoMS);
  if(memoFormulaParts.length>0 && !isOperator(memoFormulaParts[memoFormulaParts.length-1])) {
    if(MemoMS.cur==='0') memoFormulaParts.pop(); else memoFormulaParts[memoFormulaParts.length-1]=MemoMS.cur;
  }
  memoCalcUpdate();
}
function memoCalcPercent() { statePercent(MemoMS); if(memoFormulaParts.length>0&&!isOperator(memoFormulaParts[memoFormulaParts.length-1])) memoFormulaParts[memoFormulaParts.length-1]=MemoMS.cur; memoCalcUpdate(); }
function memoCalcSpecial(type) {
  const val=parseFloat(MemoMS.cur);
  if(isNaN(val)||MemoMS.cur==='エラー') return;
  let result,label;
  if(type==='tax-in'){result=val*1.1;label='税込み';}
  else if(type==='tax-out'){result=val/1.1;label='税抜き';}
  else{result=val/1.5;label='ウエル活';}
  memoExprStr=fmtN(val)+' ['+label+'] =';
  MemoMS.cur=fmtN(parseFloat(result.toPrecision(10)));
  MemoMS.justCalc=true;MemoMS.prev=null;MemoMS.op=null;
  memoFormulaParts=[MemoMS.cur];
  memoCalcUpdate();
}
function startMemoExprEdit() {
  const exprEl=document.getElementById('memoCalcExpr');
  const editor=document.getElementById('memoCalcExprEditor');
  const current=memoFormulaParts.join(' ')||memoExprStr.replace(' =','')||MemoMS.cur;
  editor.value=current;
  exprEl.classList.add('editing');
  editor.classList.add('editing');
  editor.focus();editor.select();
}
function commitMemoExprEdit() {
  const exprEl=document.getElementById('memoCalcExpr');
  const editor=document.getElementById('memoCalcExprEditor');
  exprEl.classList.remove('editing');
  editor.classList.remove('editing');
  const expr=editor.value.trim();
  if(!expr) return;
  const normalized=expr.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-').replace(/[^0-9+\-*/.() ]/g,'');
  try {
    const result=Function('"use strict";return ('+normalized+')')();
    if(typeof result!=='number'||!isFinite(result)) throw new Error();
    const fmt=fmtN(parseFloat(result.toPrecision(10)));
    memoExprStr=expr+' =';
    MemoMS.cur=fmt;MemoMS.prev=null;MemoMS.op=null;MemoMS.justCalc=true;MemoMS.fresh=false;
    memoFormulaParts=[fmt];
    memoCalcUpdate();
  } catch(e) { document.getElementById('memoCalcDisplay').textContent='エラー'; }
}
function memoExprEditorKey(e) {
  if(e.key==='Enter'){e.preventDefault();commitMemoExprEdit();}
  if(e.key==='Escape'){
    document.getElementById('memoCalcExpr').classList.remove('editing');
    document.getElementById('memoCalcExprEditor').classList.remove('editing');
    document.getElementById('memoCalcExprEditor').blur();
  }
}

/* ===== 共通：キャンペーン計算エンジン ===== */
function createCampEngine(prefix) {
  const state = {
    campaigns:[],
    idCounter:0,
    productIdCounter:0,
    campProducts:{},
    mainState: createState(),
    mainExpr:'',
    campCalcStates:{}
  };

  function saveSt() { localStorage.setItem('waon_'+prefix, JSON.stringify({campaigns:state.campaigns,campProducts:state.campProducts,idCounter:state.idCounter,productIdCounter:state.productIdCounter})); }

  function calcCampPts(c) {
    if(c.type==='fixed') {
      const products=state.campProducts[c.id]||[];
      const total=products.reduce((sum,p)=>{
        const pt=parseFloat(p.fixedPt)||0;
        const qty=p.fixedPtAutoQty?(parseInt(p.qty)||1):(parseInt(p.fixedPtQty)||1);
        return sum+pt*qty;
      },0);
      return total>0?total:null;
    }    if(c.type==='combined') {
      const products=state.campProducts[c.id]||[];
      const r=parseFloat(c.rate);
      const l=parseFloat(c.limit);
      // %還元分
      let percentPts=0;
      if(!isNaN(r)&&products.some(p=>parseFloat(p.price)>0)){
        const raw=products.reduce((sum,p)=>{
          return sum+(parseFloat(p.price)||0)*(parseInt(p.qty)||1)*(r/100);
        },0);
        percentPts=isNaN(l)?raw:Math.min(raw,l);
      }
      // 商品ごとの固定pt分
      const fixedPts=products.reduce((sum,p)=>{
        const pt=parseFloat(p.fixedPt)||0;
        const qty=p.fixedPtAutoQty?(parseInt(p.qty)||1):(parseInt(p.fixedPtQty)||1);
        return sum+pt*qty;
      },0);
      if(percentPts===0&&fixedPts===0) return null;
      return percentPts+fixedPts;
    }
    // percent type
    const products=state.campProducts[c.id]||[];
    const r=parseFloat(c.rate);
    const l=parseFloat(c.limit);
    if(isNaN(r)) return null;
    const hasAny=products.some(p=>parseFloat(p.price)>0||parseFloat(p.fixedPt)>0);
    if(!hasAny) return null;
    const raw=products.reduce((sum,p)=>{
      const price=parseFloat(p.price)||0;
      const qty=parseInt(p.qty)||1;
      return sum+price*qty*(r/100);
    },0);
    const percentPts=isNaN(l)?raw:Math.min(raw,l);
    // PayPayタブは商品ごとの固定ptも合算
    const fixedPts=prefix==='paypay'?products.reduce((sum,p)=>{
      const pt=parseFloat(p.fixedPt)||0;
      const qty=p.fixedPtAutoQty?(parseInt(p.qty)||1):(parseInt(p.fixedPtQty)||1);
      return sum+pt*qty;
    },0):0;
    return percentPts+fixedPts||null;
  }
  function calcProductTotal(cid) {
    if(!state.campProducts[cid])return 0;
    return state.campProducts[cid].reduce((s,p)=>{
      return s+(parseFloat(p.price)||0)*(parseInt(p.qty)||1);
    },0);
  }

  // ① 合計金額電卓
  function toggleMainCalc(id) {
    const el=document.getElementById(id+'-inlineCalc');
    const btn=document.getElementById(id+'-calcTrigger');
    const open=el.classList.toggle('open');

        el.innerHTML=
          `<span style="font-size:12px;color:var(--text-muted);">%還元：${Math.floor(percentPts).toLocaleString()} pt</span>`+
          (capped?`<span class="cap-warning">⚠ 付与上限に達しています</span>`:'')+
          `<span style="font-size:12px;color:var(--text-muted);">固定還元：${Math.floor(fixedPts).toLocaleString()} pt</span>`+
          `<span style="font-weight:700;">合計：${Math.floor(total).toLocaleString()} pt</span>`;

      }
      const products=state.campProducts[c.id]||[];
      const r=parseFloat(c.rate);

      const hasAny=products.some(p=>parseFloat(p.price)>0||parseFloat(p.fixedPt)>0);
      if(isNaN(r)&&prefix!=='paypay'){el.className='field-result';el.innerHTML='—';return;}
      if(!hasAny){el.className='field-result';el.innerHTML='—';return;}
      const raw=products.reduce((sum,p)=>{
        const price=parseFloat(p.price)||0;
        const qty=parseInt(p.qty)||1;
        return sum+price*qty*(r/100);
      },0);
      const capped=!isNaN(l)&&raw>l;
      const percentPts=capped?l:raw;
      // PayPayタブは固定ptも表示
      if(prefix==='paypay'){
        const fixedPts=products.reduce((sum,p)=>{
          const pt=parseFloat(p.fixedPt)||0;
          const qty=p.fixedPtAutoQty?(parseInt(p.qty)||1):(parseInt(p.fixedPtQty)||1);
          return sum+pt*qty;
        },0);
        const total=percentPts+fixedPts;
        if(total===0){el.className='field-result';el.innerHTML='—';return;}
        el.className='field-result'+(capped?' capped':'');
        el.innerHTML=
          (percentPts>0?`<span style="font-size:12px;color:var(--text-muted);">%還元：${Math.floor(percentPts).toLocaleString()} pt</span>`+
          (capped?`<span class="cap-warning">⚠ 付与上限に達しています</span>`:''): '')+
          (fixedPts>0?`<span style="font-size:12px;color:var(--text-muted);">固定還元：${Math.floor(fixedPts).toLocaleString()} pt</span>`:'')+
          `<span style="font-weight:700;">合計：${Math.floor(total).toLocaleString()} pt</span>`;
      } else {
        el.className='field-result'+(capped?' capped':'');
        el.innerHTML=`<span>${Math.floor(percentPts).toLocaleString()} pt</span>`+(capped?`<span class="cap-warning">⚠ 上限に達しています</span>`:'');
      }
    });
    const validPts=state.campaigns.map(c=>calcCampPts(c)).filter(v=>v!==null);
    const sum3=validPts.length>0?validPts.reduce((a,b)=>a+b,0):null;
    const r3=sum3;

    // PayPayタブ用：②の%還元pt合計（固定ptを除く）
    const sumPercentPts=prefix==='paypay'?state.campaigns.reduce((sum,c)=>{
      const products=state.campProducts[c.id]||[];
      const r=parseFloat(c.rate);
      const l=parseFloat(c.limit);
      if(isNaN(r)) return sum;
      const raw=products.reduce((s,p)=>{
        return s+(parseFloat(p.price)||0)*(parseInt(p.qty)||1)*(r/100);
      },0);
      const pts=isNaN(l)?raw:Math.min(raw,l);
      return sum+pts;
    },0):null;

    let r4=null,r5=null,r6=null,r7=null;
    if(prefix==='other'){
      r4=!isNaN(total1)?total1/1.5:null;
      r5=(r4!==null&&r3!==null&&!isNaN(total1)&&total1>0)
        ?(1-((r4-r3)/total1))*100:null;
    } else {
      // ⑤ = ②の%還元pt合計 ÷ 0.665
      r4=sumPercentPts!==null&&sumPercentPts>0?sumPercentPts/0.665:null;
      r5=(!isNaN(total1)&&r4!==null)?total1-r4:null;
      r6=r5!==null?r5/1.5:null;
      r7=(r6!==null&&r4!==null&&r3!==null&&!isNaN(total1)&&total1>0)
        ?(1-(r6+r4-r3)/total1)*100:null;
    }

    const set=(id,val,unit)=>{
      const el=document.getElementById(prefix+'-r'+id);
      if(!el)return;
      if(val===null){el.innerHTML='—';return;}
      el.innerHTML=Math.floor(val).toLocaleString()+(unit?`<span class="result-unit">${unit}</span>`:'');
    };
    set(3,r3,'pt'); set(4,r4,prefix==='other'?'pt':''); set(5,r5,''); set(6,r6,'pt');
    const r7el=document.getElementById(prefix+'-r7');
    if(prefix==='other'){
      if(r7el) r7el.innerHTML=r5!==null?r5.toFixed(1)+'<span class="result-unit">%</span>':'—';
      // ⑦ 実質いくら = ⑤-④ = r4-r3
      const r8el=document.getElementById(prefix+'-r8');
      const r8=(r4!==null&&r3!==null)?r4-r3:null;
      if(r8el) r8el.innerHTML=r8!==null?Math.round(r8).toLocaleString()+'<span class="result-unit">円</span>':'—';
    } else {
      if(r7el) r7el.innerHTML=r7!==null?r7.toFixed(1)+'<span class="result-unit">%</span>':'—';
      // ⑧ 実質いくら = ⑦+⑤−④ = r6+r4-r3
      const r8el=document.getElementById(prefix+'-r8');
      const r8=(r6!==null&&r4!==null&&r3!==null)?r6+r4-r3:null;
      if(r8el) r8el.innerHTML=r8!==null?Math.floor(r8).toLocaleString()+'<span class="result-unit">円</span>':'—';
    }
  }

  function addCampaign() {
    state.idCounter++;
    const cid=state.idCounter;
    state.campaigns.push({id:cid,name:'キャンペーン'+cid,rate:'',limit:'',amount:'',type:'percent',fixedPt:'',fixedQty:1});
    state.campProducts[cid]=[];
    state.campCalcStates[cid]=createState();
    state.productIdCounter++;
    state.campProducts[cid].push({id:state.productIdCounter,name:'',price:'',qty:1});
    renderCampaigns();
    saveSt();
  }

  function renderCampaigns() {
    const list=document.getElementById(prefix+'-campaignList');

    if(countEl) countEl.textContent='キャンペーン '+state.campaigns.length+' 件';
    if(!list)return;
    list.innerHTML=state.campaigns.map((c,i)=>{
      const isFixed=c.type==='fixed';
      return `
      <div class="campaign-card">
        <div class="campaign-card-header">
          <div class="campaign-name-wrap">
            <span class="campaign-num">No.${i+1}</span>
            <input class="campaign-name-input" type="text" value="${escHtml(c.name)}"
              oninput="engines['${prefix}'].updateName(${c.id},this.value)" placeholder="キャンペーン名">
            <span style="font-size:11px;color:var(--text-hint);white-space:nowrap;">←タップで変更</span>
          </div>
          <button class="btn-remove-campaign" onclick="engines['${prefix}'].removeCampaign(${c.id})">×</button>
        </div>

        ${prefix==='paypay'?'':`
        <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:6px;">キャンペーンの種類</div>
        <div class="type-toggle" style="grid-template-columns:repeat(3,1fr);">
          <button class="type-btn${c.type==='percent'?' selected':''}" onclick="engines['${prefix}'].setType(${c.id},'percent')">
            <span class="type-icon">％</span>
            ％還元タイプ
            <span class="type-sub">対象金額 × 還元率</span>
          </button>
          <button class="type-btn${c.type==='fixed'?' selected':''}" onclick="engines['${prefix}'].setType(${c.id},'fixed')">
            <span class="type-icon">🎁</span>
            固定ptタイプ
            <span class="type-sub">1点購入で○○pt還元</span>
          </button>
          <button class="type-btn${c.type==='combined'?' selected':''}" onclick="engines['${prefix}'].setType(${c.id},'combined')">
            <span class="type-icon">✨</span>
            併用型
            <span class="type-sub">%還元＋固定pt</span>
          </button>
        </div>
        `}

        ${(prefix==='paypay'||c.type==='percent'||c.type==='combined')?`
        <div class="field-group" style="margin-bottom:10px;">
          <label><span class="badge" style="width:16px;height:16px;font-size:9px;">①</span> 対象商品の購入金額</label>
          ${productPanelHTML(c.id)}
        </div>
        <div class="two-col">
          <div class="field-group">
            <label>還元率 (%)</label>
            <input type="number" class="field-input" id="${prefix}-rate-${c.id}" value="${c.rate}" placeholder="タップで入力　例：10" min="0" max="100" step="0.1"
              oninput="engines['${prefix}'].updateCamp(${c.id},'rate',this.value)">
            ${`
            <div class="rate-shortcuts">
              ${[10,20,30,40,50].map(v=>`<button class="rate-sc-btn" onclick="engines['${prefix}'].setRate(${c.id},${v})">${v}%</button>`).join('')}
            </div>`}
          </div>
          <div class="field-group">
            <label>付与上限 (pt)</label>
            <input type="number" class="field-input" value="${c.limit}" placeholder="タップで入力　例：1000" min="0"
              oninput="engines['${prefix}'].updateCamp(${c.id},'limit',this.value)">
          </div>
        </div>
        `:''}

        ${c.type==='fixed'?`
        <div class="field-group" style="margin-bottom:10px;">
          <label><span class="badge" style="width:16px;height:16px;font-size:9px;">①</span> 対象商品の購入金額</label>
          ${productPanelHTML(c.id)}
        </div>
        `:''}

        <div style="margin-top:10px;">
          <div class="field-label" style="margin-bottom:6px;">
            <span class="badge green" style="width:16px;height:16px;font-size:9px;">${prefix==='paypay'?'②':'②'}</span>
            還元ポイント
          </div>
          <div class="field-result" id="${prefix}-pts-${c.id}">—</div>
        </div>
      </div>`;
    }).join('');
    state.campaigns.forEach(c=>{renderProductList(c.id);updateCampAmount(c.id);});
  }

  function buildHTML(containerId) {
    const el=document.getElementById(containerId);
    const isPayPay=prefix==='paypay';
    el.innerHTML=`
      <div id="${prefix}-header-row" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <span class="campaigns-header"><span id="${prefix}-campaignCount">キャンペーン 0 件</span></span>
        <div style="display:flex;gap:8px;">
          <button class="btn-add-campaign" id="${prefix}-addBtn">＋ キャンペーンを追加</button>
        </div>
      </div>
      <div class="campaign-list" id="${prefix}-campaignList"></div>
      <div class="section-card" style="margin-top:12px;">
        <div class="field-label"><span class="badge">${isPayPay?'③':'③'}</span> 購入合計金額（レジで表示される金額）</div>
        <label style="display:flex;align-items:center;gap:8px;margin-bottom:10px;cursor:pointer;">
          <input type="checkbox" id="${prefix}-autoFill" onchange="engines['${prefix}'].toggleAutoFill(this.checked)"
            style="width:18px;height:18px;accent-color:var(--accent);cursor:pointer;">
          <span style="font-size:13px;font-weight:500;color:var(--text-muted);">キャンペーン対象商品のみ購入（①の合計を自動入力）</span>
        </label>
        ${mainInlineCalcHTML(prefix+'-main')}
        <input type="hidden" id="${prefix}-totalAmount">
        <div id="${prefix}-totalWarning" style="display:none;font-size:12px;font-weight:700;color:#a02020;margin-top:6px;padding:6px 10px;background:#fde8e8;border-radius:8px;border:1px solid #e8a0a0;">
          ⚠ 購入合計金額が300円未満です！300円以上になるように購入してね
        </div>
      </div>
      <div class="result-section">
        <h2>📊 計算結果（全キャンペーン合算）</h2>
        <div class="result-grid">
          ${isPayPay?`
          <div class="result-item hi-orange" style="grid-column:span 2;">
            <div class="result-item-label"><span class="badge" style="width:16px;height:16px;font-size:9px;background:var(--accent)">④</span>合計還元ポイント</div>
            <div class="result-item-value" id="${prefix}-r3">—<span class="result-unit">pt</span></div>
            <div class="hint">全②の合計</div>
          </div>
          <div class="result-item">
            <div class="result-item-label"><span class="badge gray" style="width:16px;height:16px;font-size:9px;">⑤</span>PayPay払いする金額</div>
            <div class="result-item-value" id="${prefix}-r4">—</div>
            <div class="hint">②の%還元pt÷0.665</div>
          </div>
          <div class="result-item">
            <div class="result-item-label"><span class="badge gray" style="width:16px;height:16px;font-size:9px;">⑥</span>PayPay払い後の金額</div>
            <div class="result-item-value" id="${prefix}-r5">—</div>
            <div class="hint">③−⑤</div>
          </div>
          <div class="result-item hi-green">
            <div class="result-item-label"><span class="badge green" style="width:18px;height:18px;font-size:11px;">⑦</span>利用するWAONPOINT数</div>
            <div class="result-item-value" id="${prefix}-r6">—<span class="result-unit">pt</span></div>
            <div class="hint">⑥÷1.5</div>
          </div>
          <div class="result-item" style="grid-column:span 2;border:2px solid var(--border2);">
            <div class="result-item-label"><span class="badge gray" style="width:18px;height:18px;font-size:11px;">⑧</span>実質いくら</div>
            <div class="result-item-value" id="${prefix}-r8">—<span class="result-unit">円</span></div>
            <div class="hint">⑦+⑤−④</div>
          </div>
          <div class="result-item hi-blue" style="grid-column:span 2;">
            <div class="result-item-label"><span class="badge blue" style="width:18px;height:18px;font-size:11px;">⑨</span>いくらお得になったか</div>
            <div class="result-item-value" id="${prefix}-r7">—<span class="result-unit">%</span></div>
            <div class="hint">1−(⑦+⑤−④)÷③</div>
          </div>
          `:`
          <div class="result-item hi-orange" style="grid-column:span 2;">
            <div class="result-item-label"><span class="badge" style="width:16px;height:16px;font-size:9px;background:var(--accent)">④</span>合計還元ポイント</div>
            <div class="result-item-value" id="${prefix}-r3">—<span class="result-unit">pt</span></div>
            <div class="hint">全②の合計</div>
          </div>
          <div class="result-item hi-green" style="grid-column:span 2;">
            <div class="result-item-label"><span class="badge green" style="width:18px;height:18px;font-size:11px;">⑤</span>利用するWAONPOINT数</div>
            <div class="result-item-value" id="${prefix}-r4">—<span class="result-unit">pt</span></div>
            <div class="hint">③÷1.5</div>
          </div>
          <div class="result-item hi-blue" style="grid-column:span 2;">
            <div class="result-item-label"><span class="badge blue" style="width:18px;height:18px;font-size:11px;">⑥</span>いくらお得になったか</div>
            <div class="result-item-value" id="${prefix}-r7">—<span class="result-unit">%</span></div>
            <div class="hint">1−((⑤−④)÷③)</div>
          </div>
          <div class="result-item" style="grid-column:span 2;border:2px solid var(--border2);">
            <div class="result-item-label"><span class="badge gray" style="width:18px;height:18px;font-size:11px;">⑦</span>実質いくら</div>
            <div class="result-item-value" id="${prefix}-r8">—<span class="result-unit">円</span></div>
            <div class="hint">⑤−④</div>
          </div>
          `}
        </div>
      </div>`;
    // クロージャでprefixをキャプチャしてイベントリスナーを設定
    (function(pref){
      document.getElementById(pref+'-addBtn').addEventListener('click', function(){ engines[pref].addCampaign(); });
    })(prefix);
    addCampaign();
  }

  function resetAll() {
    if(!confirm('すべての入力をリセットしますか？'))return;
    // stateをすべてクリア
    state.campaigns=[];
    state.idCounter=0;
    state.productIdCounter=0;
    Object.keys(state.campProducts).forEach(k=>delete state.campProducts[k]);
    Object.keys(state.campCalcStates).forEach(k=>delete state.campCalcStates[k]);
    // localStorageもクリア
    localStorage.removeItem('waon_'+prefix);
    // DOM要素をリセット
    const ta=document.getElementById(prefix+'-totalAmount');
    if(ta) ta.value='';
    const tv=document.getElementById(prefix+'-main-calcTriggerVal');
    if(tv) tv.textContent='タップで入力 🧮';
    const ic=document.getElementById(prefix+'-main-inlineCalc');
    if(ic) ic.classList.remove('open');
    const ct=document.getElementById(prefix+'-main-calcTrigger');
    if(ct) ct.classList.remove('active','has-value');
    const cb=document.getElementById(prefix+'-autoFill');
    if(cb) cb.checked=false;
    const wn=document.getElementById(prefix+'-totalWarning');
    if(wn) wn.style.display='none';
    stateAC(state.mainState);
    ['r3','r4','r5','r6','r7','r8'].forEach(id=>{
      const el=document.getElementById(prefix+'-'+id);
      if(el) el.innerHTML='—';
    });
    renderCampaigns();
    addCampaign();
  }

  // 公開メソッド
  return {
    buildHTML, addCampaign, renderCampaigns, resetAll,
    toggleAutoFill(checked){
      if(checked) applyAutoFill();
    },
    setType(id,type){
      const c=state.campaigns.find(c=>c.id===id);
      if(c){c.type=type;renderCampaigns();calculate();saveSt();}
    },
    setRate(id,rate){
      const c=state.campaigns.find(c=>c.id===id);
      if(c){
        c.rate=rate;
        const input=document.getElementById(prefix+'-rate-'+id);
        if(input) input.value=rate;
        calculate();saveSt();
      }
    },
    removeCampaign(id){state.campaigns=state.campaigns.filter(c=>c.id!==id);delete state.campProducts[id];renderCampaigns();calculate();saveSt();},
    updateCamp(id,field,value){const c=state.campaigns.find(c=>c.id===id);if(c){c[field]=value;calculate();saveSt();}},
    updateName(id,value){const c=state.campaigns.find(c=>c.id===id);if(c){c.name=value;saveSt();}},
    toggleMainCalcById(id){
      const el=document.getElementById(id+'-inlineCalc');
      const btn=document.getElementById(id+'-calcTrigger');
      const open=el.classList.toggle('open');
      btn.classList.toggle('active',open);
    },
    mcNum(id,v){const s=state.campCalcStates[id];if(!s)return;stateNum(s,v);updateMiniDisplay(id);},
    mcDot(id){const s=state.campCalcStates[id];if(!s)return;stateDot(s);updateMiniDisplay(id);},
    mcOp(id,op){const s=state.campCalcStates[id];if(!s)return;stateOp(s,op);updateMiniDisplay(id);},
    mcEq(id){const s=state.campCalcStates[id];if(!s)return;stateEq(s);updateMiniDisplay(id);},
    mcAC(id){const s=state.campCalcStates[id];if(!s)return;stateAC(s);updateMiniDisplay(id);},
    mcDel(id){const s=state.campCalcStates[id];if(!s)return;stateDel(s);updateMiniDisplay(id);},
    mcPct(id){const s=state.campCalcStates[id];if(!s)return;statePercent(s);updateMiniDisplay(id);},
    mcApply(id){
      const s=state.campCalcStates[id];if(!s)return;
      const val=parseFloat(s.cur);if(isNaN(val)||s.cur==='エラー')return;
      document.getElementById(prefix+'-totalAmount').value=val;
      const tv=document.getElementById(id+'-calcTriggerVal');
      if(tv) tv.textContent=Math.round(val).toLocaleString()+' 円';
      const btn=document.getElementById(id+'-calcTrigger');
      if(btn){btn.classList.remove('active');btn.classList.add('has-value');}
      const ic=document.getElementById(id+'-inlineCalc');
      if(ic) ic.classList.remove('open');
      calculate();saveSt();
    },
    toggleProductPanel(cid){
      const el=document.getElementById(prefix+'-pPanel-'+cid);
      const btn=document.getElementById(prefix+'-pTrigger-'+cid);
      if(el&&btn){el.classList.toggle('open');btn.classList.toggle('active');}
    },
    addProduct(cid){
      state.productIdCounter++;
      if(!state.campProducts[cid]) state.campProducts[cid]=[];
      state.campProducts[cid].push({id:state.productIdCounter,name:'',price:'',qty:1});
      renderProductList(cid);updateCampAmount(cid);saveSt();
    },
    removeProduct(cid,pid){
      state.campProducts[cid]=state.campProducts[cid].filter(p=>p.id!==pid);
      renderProductList(cid);updateCampAmount(cid);saveSt();
    },
    updateProduct(cid,pid,field,value){
      const p=(state.campProducts[cid]||[]).find(p=>p.id===pid);
      if(p){
        if(field==='qty'){
          p.qty=Math.max(1,parseInt(value)||1);
          if(p.fixedPtAutoQty) p.fixedPtQty=p.qty;
        } else if(field==='fixedPtAutoQty'){
          p.fixedPtAutoQty=value;
          if(value) p.fixedPtQty=parseInt(p.qty)||1;
        } else if(field==='fixedPtQty'){
          p.fixedPtQty=Math.max(1,parseInt(value)||1);
        } else {
          p[field]=value;
        }
        if(field==='price'||field==='qty'||field==='fixedPt'||field==='fixedPtQty'||field==='fixedPtAutoQty'){
          updateCampAmount(cid);
        }
        if(field==='fixedPtAutoQty') renderProductList(cid);
        saveSt();
      }
    }
  };
}

/* ===== エンジン初期化 ===== */
const engines = {};
engines['paypay'] = createCampEngine('paypay');
engines['other']  = createCampEngine('other');

// グローバルからエンジンを呼べるようにする
function resetEngine(prefix){ engines[prefix].resetAll(); }
function addCampaignEngine(prefix){ engines[prefix].addCampaign(); }

// DOM準備後に構築
window.addEventListener('DOMContentLoaded', ()=>{
  engines['paypay'].buildHTML('paypayContent');
  engines['other'].buildHTML('otherContent');
  renderMemo();
  mainUpdate();
});
</script>
